name: media_backup
description: >
  iOS photo & video backup plugin. Scans the photo library into SQLite,
  uploads to Supabase, S3, GCS, Azure, Firebase or any HTTP endpoint with
  resumable uploads, byte-based concurrency, and push-based progress events.
version: 0.3.0
homepage: https://github.com/nexas105/flutter_media_backup
repository: https://github.com/nexas105/flutter_media_backup
issue_tracker: https://github.com/nexas105/flutter_media_backup/issues

topics:
  - backup
  - media
  - photos
  - upload
  - supabase

environment:
  sdk: ^3.11.5
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: MediaBackupPlugin
